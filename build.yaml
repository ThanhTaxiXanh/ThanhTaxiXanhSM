# build.yaml - Cấu hình build_runner cho Drift và Riverpod code generation

targets:
  $default:
    builders:
      # === DRIFT: generate .g.dart từ schema ===
      drift_dev:
        options:
          # Tạo migration SQL khi schema thay đổi
          generate_connect_constructor: true
          # Tắt eager loading để tối ưu performance
          eager_loading: false
          # Tạo type-safe companions
          generate_companions: true

      # === RIVERPOD: tắt code-gen annotation nếu không dùng @riverpod ===
      riverpod_generator:
        options:
          riverpod_version: 2
